<!DOCTYPE html>
<html>
<head><title>Lista de Alunos</title></head>
<body>
    <h2>Cadastrar Aluno</h2>
    <input type="text" id="nomeAluno" placeholder="Nome do aluno">
    <button onclick="cadastrar()">Enviar</button>

    <h2>Alunos Cadastrados</h2>
    <ul id="lista"></ul>

    <script>
        async function listar() {
            const res = await fetch('/pessoas');
            const alunos = await res.json();
            const ul = document.getElementById('lista');
            ul.innerHTML = alunos.map(a => `<li>${a.nome}</li>`).join('');
        }

        async function cadastrar() {
            const nome = document.getElementById('nomeAluno').value;
            await fetch('/pessoas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome })
            });
            document.getElementById('nomeAluno').value = ''; // Limpa o campo
            listar(); // Atualiza a lista na tela
        }

        listar(); // Carrega ao abrir a página
    </script>
</body>
</html>
