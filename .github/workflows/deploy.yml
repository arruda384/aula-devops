name: Deploy

on:
  push:
    # Dispara o deploy tanto na main quanto na develop
    branches: [ "main", "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}       # IP do servidor nos Secrets
          username: deploy                   # Usuário com permissão Docker
          key: ${{ secrets.VPS_SSH_KEY }}     # Conteúdo da sua id_rsa
          script: |
            # Garante que a pasta exista sem dar erro
            mkdir -p /home/deploy/apps/app
            cd /home/deploy/apps/app

            # Lógica de "Primeiro Deploy": se não tem .git, clona o repo
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              # Se já existe, apenas baixa as novidades
              git pull --ff-only
            fi

            # --build: O servidor constrói a imagem (você não precisa de Docker local!)
            docker compose up -d --build