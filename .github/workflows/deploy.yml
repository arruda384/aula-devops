name: Deploy
on:
 push:
 branches: [ "main" ]

jobs:
 deploy:
 runs-on: ubuntu-latest
 steps:
 - name: Deploy via SSH
 uses: appleboy/ssh-action@v1.0.3
 with:
 host: ${{ secrets.VPS_HOST }}
 username: deploy
 key: ${{ secrets.VPS_SSH_KEY }}
 script: |
 cd /home/deploy/apps/app
 git pull --ff-only
 docker compose pull
 docker compose up -d